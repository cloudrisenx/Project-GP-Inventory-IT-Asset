<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Status - Inventory IT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <div class="page-header animate-fade-in">
            <a href="/settings" class="btn-back"><span>&larr;</span> Kembali</a>
            <div class="page-title"><h2>Status Asset</h2></div>
            <button onclick="addStatus()" class="btn-primary">+ Tambah Status</button>
        </div>

        <div class="table-responsive animate-slide-up">
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="50">NO</th>
                        <th>Nama Status</th>
                        <th width="150">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td style="text-align: center; font-weight: bold;">{{ loop.index }}</td>
                        <td>
                            <!-- Badge sederhana untuk status -->
                            <span style="padding: 5px 10px; border-radius: 15px; background: #e5e7eb; font-weight:bold;">
                                {{ item.status_name }}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-sm btn-edit" onclick="editStatus('{{ item.status_id }}', '{{ item.status_name }}')">Edit</button>
                                <form action="/settings/status/delete/{{ item.status_id }}" method="POST" onsubmit="return confirm('Hapus status ini?');">
                                    <button type="submit" class="btn-sm btn-delete">Hapus</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" style="text-align:center;">Belum ada data status.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL POPUP FORM -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('formModal')">&times;</span>
            <h3 id="modalTitle">Tambah Status</h3>
            <form id="formItem" action="/settings/status/save" method="POST">
                <input type="hidden" id="status_id" name="status_id">
                
                <div class="form-group">
                    <label>Nama Status</label>
                    <input type="text" id="status_name" name="status_name" required placeholder="Contoh: Baik, Rusak, Sedang Diperbaiki">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('formModal')">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='settings.js') }}"></script>
</body>
</html>
