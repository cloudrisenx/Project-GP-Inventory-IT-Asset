<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Password - Asset Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Kita pakai CSS yang sama dengan tambah_user agar desainnya selaras -->
    <link rel="stylesheet" href="{{ url_for('static', filename='tambah_user.css') }}">
</head>
<body>

    <div class="form-container">
        <div class="header-nav">
            <a href="{{ url_for('index') }}" class="back-link"><i class='bx bx-arrow-back'></i> Kembali ke Dashboard</a>
        </div>

        <div class="form-box">
            <h2><i class='bx bx-lock-open-alt'></i> Ganti Password</h2>
            <p>Ubah kata sandi akun <b>{{ user.username }}</b> Anda</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            <i class='bx bx-info-circle'></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('ganti_password') }}" method="POST" id="gantiPasswordForm">
                <div class="input-group">
                    <label>Password Lama</label>
                    <input type="password" name="old_password" placeholder="Masukkan password lama" required>
                </div>
                
                <div class="input-group">
                    <label>Password Baru</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Masukkan password baru" required>
                </div>

                <div class="input-group">
                    <label>Konfirmasi Password Baru</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Ketik ulang password baru" required>
                    <small id="errorMsg" style="color: #c62828; display: none; margin-top: 5px;">Password tidak cocok!</small>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Perbarui Password</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='ganti_password.js') }}"></script>
</body>
</html>
